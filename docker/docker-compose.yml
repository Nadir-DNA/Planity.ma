version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: planity-postgres
    environment:
      POSTGRES_USER: planity
      POSTGRES_PASSWORD: planity_dev
      POSTGRES_DB: planity_ma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: planity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: planity-minio
    environment:
      MINIO_ROOT_USER: planity_minio
      MINIO_ROOT_PASSWORD: planity_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
